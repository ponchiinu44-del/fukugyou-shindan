  const timeText = timeLabels[answers[1]] !== undefined ? timeLabels[answers[1]] : "あなたのペース";

  // Q9（index=8）: 目標収入
  const incomeLabels = ["月数千円のスモールスタート", "月1〜3万円", "月5〜10万円以上", "本業を超える収入"];
  const incomeText = answers[8] !== undefined ? incomeLabels[answers[8]] : "目標収入";

  // Q15（index=14）: 副業に求めること
  const goalLabels = ["すぐにお金になること", "スキルが身につくこと", "自分らしく楽しめること", "将来の資産になること"];
  const goalText = answers[14] !== undefined ? goalLabels[answers[14]] : "あなたの目標";

  // Q13（index=12）: 得意なこと
  const skillLabels = ["物を見つける目", "情報収集・まとめ力", "人の気持ちを読む力", "数字やデータを扱う力"];
  const skillText = answers[12] !== undefined ? skillLabels[answers[12]] : "あなたの強み";

  const reasonMap = {
    furima: `「${goalText}」を重視するあなたに、フリマ・物販は最短ルートです。${timeText}でも出品・発送が完結するスマホ完結型で、売れた瞬間に収入が入ります。${skillText}を活かして、まず手元の不用品から始められます。`,
    sns: `「${goalText}」を大切にするあなたに、SNS運用はぴったりです。${timeText}を使って投稿を積み上げるだけで、フォロワーが増えるほど収入の選択肢が広がります。${skillText}がそのままコンテンツの武器になります。`,
    uranai: `「${goalText}」を求めるあなたに、占い・スピリチュアル系は高相性です。${skillText}を持つあなたは、人に寄り添うコンテンツで自然に共感を集められます。${timeText}でも高単価案件（1件5,000〜8,000円）を狙えるのが強みです。`,
    cloud: `「${goalText}」を目指すあなたに、クラウドソーシングは安定した選択肢です。${timeText}から始めて、${incomeText}まで着実にステップアップできます。${skillText}が直接単価アップにつながるのが魅力です。`,
    affiliate: `「${goalText}」を見据えるあなたに、アフィリエイトは資産型副業として最適です。${timeText}でコツコツ積み上げれば、${incomeText}を目標にした自動収入の仕組みが作れます。${skillText}が記事品質を高める武器になります。`,
    ai: `「${goalText}」を目指すあなたに、AI副業は今最もコスパの高い選択です。${timeText}でも学習が進み、${incomeText}を現実的に狙えます。${skillText}があれば、AIツールと組み合わせて生産性が一気に上がります。`,
    toushi: `「${goalText}」を描くあなたに、投資・資産運用は最もスケールする副業です。${timeText}で学習しながら、${incomeText}という目標に向けて資産を育てられます。${skillText}があれば、情報の取捨選択で有利に動けます。`
  };

  return reasonMap[topKey] || "";
}

// 回答から特徴タグを生成
function buildTags() {
  const tags = [];
  const timeTagMap = ["スキマ時間活用型", "1〜2時間/日型", "週末集中型", "がっつり取組型"];
  if (answers[1] !== undefined) tags.push(timeTagMap[answers[1]]);
  const incomeTagMap = ["スモールスタート", "月1〜3万円目標", "月5〜10万円目標", "本業超え目標"];
  if (answers[8] !== undefined) tags.push(incomeTagMap[answers[8]]);
  const goalTagMap = ["即金重視", "スキル重視", "楽しさ重視", "資産形成重視"];
  if (answers[14] !== undefined) tags.push(goalTagMap[answers[14]]);
  return tags.map(t => `<span class="reason-tag">${t}</span>`).join('');
}

function showResult(app) {
  const top = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  const r = results[top];
  const personalReason = buildReason(top);
  const tags = buildTags();
  const today = new Date().toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });
  const trendItems = (r.trends || []).map(t => `<li>${t}</li>`).join('');

  app.innerHTML = `
    <div class="result-card">
      <div class="result-top">
        <div class="result-icon">${r.icon}</div>
        <div class="result-label">あなたに合う副業は</div>
        <div class="result-title">${r.name}</div>
        <div class="result-badge">${r.badge}</div>
      </div>
      <div class="result-desc">${r.desc}</div>
      <div class="reason-box">
        <strong>あなたに向いている理由：</strong>${personalReason}
        <div class="reason-tags">${tags}</div>
      </div>
      <div class="trend-box">
        <span class="trend-head">📈 SNSでの伸ばし方（2026年トレンド）</span>
        <span class="trend-date">最終更新：${today} 時点のX・Instagram・YouTubeリサーチより</span>
        <ul class="trend-list">${trendItems}</ul>
      </div>
      <div class="slot-label">おすすめスクール</div>
      <div class="affiliate-slot">${r.slot}</div>
    </div>
    <button class="retry-btn" onclick="restart()">↩ もう一度診断する</button>
    <a class="retry-btn" href="trends.html" style="display:block;text-align:center;text-decoration:none;">📊 全ジャンルのSNSトレンドを見る</a>
  `;
}

function restart() {
  current = 0;
  scores = { furima: 0, sns: 0, uranai: 0, cloud: 0, affiliate: 0, ai: 0, toushi: 0 };
  answers = {};
  render();
}

render();
</script>
</body>
</html>
