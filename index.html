<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f9f9f7; color: #1a1a1a; }
.wrap { max-width: 600px; margin: 0 auto; padding: 2rem 1rem; }
h1 { font-size: 20px; font-weight: 500; text-align: center; margin-bottom: 2rem; color: #1a1a1a; }
.progress-bar-bg { background: #e8e8e8; border-radius: 99px; height: 6px; margin-bottom: 2rem; }
.progress-bar-fill { background: #7F77DD; height: 6px; border-radius: 99px; transition: width 0.3s; }
.q-num { font-size: 13px; color: #888; margin-bottom: 0.5rem; }
.q-text { font-size: 18px; font-weight: 500; color: #1a1a1a; margin-bottom: 1.5rem; line-height: 1.5; }
.options { display: flex; flex-direction: column; gap: 10px; }
.opt-btn { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 14px 16px; font-size: 15px; color: #1a1a1a; cursor: pointer; text-align: left; transition: border-color 0.15s, background 0.15s; }
.opt-btn:hover { border-color: #7F77DD; background: #EEEDFE; color: #3C3489; }
.result-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; }
.result-label { font-size: 14px; color: #888; margin-bottom: 4px; }
.result-title { font-size: 26px; font-weight: 500; color: #1a1a1a; margin-bottom: 0.5rem; }
.result-badge { display: inline-block; background: #EEEDFE; color: #3C3489; font-size: 12px; padding: 4px 12px; border-radius: 8px; margin-bottom: 1.25rem; }
.result-desc { font-size: 15px; color: #555; line-height: 1.8; margin-bottom: 1.5rem; }
.reason-box { background: #f5f5f3; border-radius: 8px; padding: 14px 16px; font-size: 14px; color: #555; line-height: 1.7; margin-bottom: 1.5rem; }
.reason-box strong { color: #1a1a1a; font-weight: 500; }
.affiliate-slot-label { font-size: 11px; color: #aaa; margin-bottom: 6px; letter-spacing: 0.05em; }
.affiliate-slot { border: 1px dashed #ccc; border-radius: 12px; padding: 1.25rem; text-align: center; color: #aaa; font-size: 14px; margin-bottom: 1rem; }
.retry-btn { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 12px 24px; font-size: 14px; color: #888; cursor: pointer; }
.retry-btn:hover { border-color: #7F77DD; color: #3C3489; }
</style>

const results = {
  furima: {
    name: "フリマ・物販",

    desc: "メルカリ・ラクマなどを使って不用品を売ったり、商品を仕入れて転売する副業です。スマホ1台で今日から始められ、売れた瞬間に収入が入る即金性の高さが魅力。物を見る目が育つと、せどりや輸入販売へも広げていけます。",
    reason: "直感的に行動できて、スキマ時間を上手に使えるあなたにぴったりです。難しい知識がなくてもすぐ始められ、実践しながらコツをつかんでいけます。",
    slot: "👉 おすすめスクールのリンクをここに貼る"
  },
  sns: {

    badge: "発信が資産になる 長期収入型",

    reason: "人と関わるのが好きで、発信を楽しめるあなたに向いています。自分らしさをそのまま発信できる人が伸びやすいジャンルです。",

    reason: "人の気持ちに寄り添うのが得意で、直感派のあなたにぴったり。スピリチュアルへの親和性がそのまま強みになります。",
    slot: "👉 おすすめスクールのリンクをここに貼る"
  },
  cloud: {
    name: "クラウドソーシング",
    badge: "スキルが収入に直結 安定型",
    desc: "クラウドワークスやランサーズで、ライティング・データ入力・デザインなどの仕事を受注する副業です。特別なスキルがなくても簡単な案件からスタートでき、実績を積むほど受注単価が上がっていきます。",
    reason: "コツコツ作業が得意で、スキルを着実に伸ばしたいあなたに向いています。努力した分だけ収入に反映されるのが魅力です。",

let current = 0;
let scores = { furima: 0, sns: 0, uranai: 0, cloud: 0, affiliate: 0, ai: 0, toushi: 0 };

function render() {
  const app = document.getElementById('app');
  if (current >= questions.length) { showResult(app); return; }
  const q = questions[current];
  const pct = Math.round((current / questions.length) * 100);
  app.innerHTML = `
    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="q-num">質問 ${current + 1} / ${questions.length}</div>
    <div class="q-text">${q.text}</div>
    <div class="options">${q.options.map((o, i) => `<button class="opt-btn" onclick="answer(${i})">${o.text}</button>`).join('')}</div>
  `;
}

function answer(i) {
  const sc = questions[current].options[i].scores;
  Object.keys(sc).forEach(k => { if(scores[k] !== undefined) scores[k] += sc[k]; });
  current++;
  render();
}

function showResult(app) {
  const top = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  const r = results[top];
  app.innerHTML = `
    <div class="result-card">
      <div class="result-label">あなたに合う副業は</div>
      <div class="result-title">${r.name}</div>
      <div class="result-badge">${r.badge}</div>
      <div class="result-desc">${r.desc}</div>
      <div class="reason-box"><strong>あなたに向いている理由：</strong>${r.reason}</div>
      <div style="font-size:11px;color:#aaa;margin-bottom:6px;letter-spacing:0.05em;">おすすめスクール</div>
      <div style="border:1px dashed #ccc;border-radius:12px;padding:1.25rem;text-align:center;color:#aaa;font-size:14px;margin-bottom:1rem;">${r.slot}</div>
    </div>
    <button class="retry-btn" onclick="restart()">もう一度診断する</button>
  `;
}

function restart() {
  current = 0;
  scores = { furima: 0, sns: 0, uranai: 0, cloud: 0, affiliate: 0, ai: 0, toushi: 0 };
  render();
}

render();
</script>
</body>
</html>
