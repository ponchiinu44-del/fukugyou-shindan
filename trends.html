<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>収集データ一覧 | 副業診断</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f5f5f5; color: #333; }

    header {
      background: linear-gradient(135deg, #a8edea, #fed6e3);
      padding: 32px 20px 24px;
      text-align: center;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; color: #444; margin-bottom: 6px; }
    header p { font-size: 0.85rem; color: #666; }

    .filter-wrap {
      display: flex; flex-wrap: wrap; gap: 10px;
      justify-content: center;
      padding: 20px 16px;
      background: #fff;
      border-bottom: 1px solid #eee;
    }
    .filter-btn {
      padding: 8px 18px;
      border: 2px solid #ccc;
      border-radius: 999px;
      background: #fff;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: #a8edea;
      border-color: #a8edea;
      color: #333;
      font-weight: 600;
    }

    #list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      padding: 24px 16px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .card-icon { font-size: 1.8rem; }
    .card-name { font-size: 1rem; font-weight: 700; }
    .card-badge {
      display: inline-block;
      font-size: 0.72rem;
      background: #f0f0f0;
      border-radius: 999px;
      padding: 2px 10px;
      margin-bottom: 12px;
      color: #666;
    }
    .trend-list { list-style: none; }
    .trend-list li {
      font-size: 0.88rem;
      padding: 5px 0;
      border-bottom: 1px dashed #eee;
      color: #555;
    }
    .trend-list li:last-child { border-bottom: none; }
    .trend-list li::before { content: "▸ "; color: #a8edea; font-weight: bold; }

    .sources {
      max-width: 1000px;
      margin: 0 auto 40px;
      padding: 0 16px;
    }
    .sources h2 { font-size: 1rem; margin-bottom: 12px; color: #666; }
    .sources ul { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .sources ul li a {
      font-size: 0.85rem;
      color: #5b9bd5;
      text-decoration: none;
    }
    .sources ul li a:hover { text-decoration: underline; }

    .back-link {
      display: block;
      text-align: center;
      padding: 16px;
      font-size: 0.9rem;
      color: #888;
    }
    .back-link a { color: #5b9bd5; text-decoration: none; }
  </style>
</head>
<body>

<header>
  <h1>📊 収集データ一覧</h1>
  <p>最終更新：<span id="updated"></span></p>
</header>

<div class="filter-wrap">
  <button class="filter-btn active" onclick="render('all', this)">すべて</button>
  <button class="filter-btn" onclick="render('占い', this)">🔮 占い</button>
  <button class="filter-btn" onclick="render('副業', this)">💼 副業</button>
  <button class="filter-btn" onclick="render('アフィリ', this)">✍️ アフィリエイト</button>
</div>

<div id="list"></div>

<div class="sources">
  <h2>📚 リサーチ参照元</h2>
  <ul>
    <li><a href="https://www.threads.net/" target="_blank">Threads 公式（トレンド調査）</a></li>
    <li><a href="https://twitter.com/search?q=%E5%89%AF%E6%A5%AD&src=typed_query&f=top" target="_blank">X（Twitter）副業 検索トレンド</a></li>
    <li><a href="https://www.youtube.com/results?search_query=%E5%89%AF%E6%A5%AD+%E3%82%B5%E3%83%A9%E3%83%AA%E3%83%BC%E3%83%9E%E3%83%B3" target="_blank">YouTube 副業 サラリーマン 検索</a></li>
    <li><a href="https://note.com/hashtag/%E5%89%AF%E6%A5%AD" target="_blank">note #副業 ハッシュタグ</a></li>
    <li><a href="https://note.com/hashtag/%E5%8D%A0%E3%81%84" target="_blank">note #占い ハッシュタグ</a></li>
    <li><a href="https://coconala.com/categories/210" target="_blank">ココナラ 占い・スピリチュアルカテゴリ</a></li>
    <li><a href="https://www.instagram.com/explore/tags/%E5%89%AF%E6%A5%AD/" target="_blank">Instagram #副業 ハッシュタグ</a></li>
    <li><a href="https://www.instagram.com/explore/tags/%E5%8D%A0%E3%81%84/" target="_blank">Instagram #占い ハッシュタグ</a></li>
    <li><a href="https://www.amazon.co.jp/s?k=%E5%89%AF%E6%A5%AD+%E6%9C%AC&i=stripbooks" target="_blank">Amazon 副業本 ランキング</a></li>
  </ul>
</div>

<p class="back-link"><a href="index.html">← 副業診断に戻る</a></p>

<script>
  const data = [
    {
      icon: "🔮",
      name: "占い・スピリチュアル系",
      badge: "Threads × 霊視ブーム",
      theme: "占い",
      trends: [
        "霊視・霊感鑑定への需要が急増中",
        "タロット×SNSの組み合わせが人気",
        "一粒万倍日など開運日コンテンツが拡散しやすい"
      ]
    },
    {
      icon: "📱",
      name: "SNS運用・Threads",
      badge: "フォロワー収益化",
      theme: "副業",
      trends: [
        "Threadsへの移住組が増加、早期参入が有利",
        "サラリーマンの等身大発信が共感を集める",
        "アフィリ導線として診断ツールとの相性が良い"
      ]
    },
    {
      icon: "🛍️",
      name: "フリマ・物販",
      badge: "メルカリ×せどり",
      theme: "副業",
      trends: [
        "メルカリ転売の初心者向け解説が需要大",
        "ブランド古着・ゲームソフトが売れ筋",
        "月1〜3万円の小さな成功体験報告が拡散"
      ]
    },
    {
      icon: "💻",
      name: "クラウドソーシング",
      badge: "ランサーズ・クラウドワークス",
      theme: "副業",
      trends: [
        "ライティング・文字起こし案件が初心者向けに人気",
        "AIを使ったライティング効率化が注目",
        "月5万円達成報告の投稿がエンゲージ高い"
      ]
    },
    {
      icon: "🤖",
      name: "AIスクール・AI副業",
      badge: "ChatGPT×副業",
      theme: "副業",
      trends: [
        "ChatGPT活用術が副業コンテンツの主流に",
        "AI×画像生成で収益化する事例が増加",
        "文系・非エンジニアでも始めやすい訴求が刺さる"
      ]
    },
    {
      icon: "✍️",
      name: "アフィリエイト・ブログ",
      badge: "SEO×収益化",
      theme: "アフィリ",
      trends: [
        "雑記ブログより特化ブログへの移行が加速",
        "SNS流入をブログに誘導するハイブリッド戦略が主流",
        "副業スクールのアフィリ案件が高単価で人気"
      ]
    },
    {
      icon: "📈",
      name: "投資スクール・資産運用",
      badge: "NISA×積立",
      theme: "アフィリ",
      trends: [
        "新NISA開始でインデックス投資入門コンテンツが急増",
        "投資×副業の掛け合わせ発信が注目",
        "証券口座開設アフィリが高報酬で定番化"
      ]
    }
  ];

  document.getElementById('updated').textContent = '2026年6月25日';

  function render(theme, btn) {
    if (btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    const filtered = theme === 'all' ? data : data.filter(d => d.theme === theme);
    document.getElementById('list').innerHTML = filtered.map(d => `
      <div class="card">
        <div class="card-header">
          <span class="card-icon">${d.icon}</span>
          <span class="card-name">${d.name}</span>
        </div>
        <span class="card-badge">${d.badge}</span>
        <ul class="trend-list">
          ${d.trends.map(t => `<li>${t}</li>`).join('')}
        </ul>
      </div>
    `).join('');
  }

  render('all');
</script>
</body>
</html>
